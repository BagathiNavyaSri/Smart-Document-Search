<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#f5f7fb] min-h-screen flex items-center justify-center px-6">

    <!-- CARD -->
    <div class="w-full max-w-md bg-white border border-gray-200 rounded-3xl p-8 shadow-sm">

        <!-- HEADER -->
        <div class="text-center mb-8">

            <div class="flex justify-center mb-5">

                <div class="w-16 h-16 rounded-2xl bg-blue-100 flex items-center justify-center">

                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-blue-600" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />

                    </svg>

                </div>

            </div>

            <h1 class="text-2xl font-bold text-gray-800">

                Create Account

            </h1>

            <p class="text-gray-500 mt-2 text-sm">

                Join Smart AI Document Search

            </p>

        </div>

        <!-- FORM -->
        <div class="space-y-4">

            <div>

                <input type="text" id="username" placeholder="Username"
                    class="w-full bg-[#f8fafc] border border-gray-300 rounded-2xl px-5 py-4 outline-none focus:border-blue-500 text-sm">

                <p class="text-xs text-gray-500 mt-2 ml-2">

                    Username should contain at least 3 characters

                </p>

            </div>

            <input type="email" id="email" placeholder="Email"
                class="w-full bg-[#f8fafc] border border-gray-300 rounded-2xl px-5 py-4 outline-none focus:border-blue-500 text-sm">

                <div>

                    <input type="password" id="password" placeholder="Password"
                        class="w-full bg-[#f8fafc] border border-gray-300 rounded-2xl px-5 py-4 outline-none focus:border-blue-500 text-sm">

                    <p class="text-xs text-gray-500 mt-2 ml-2">

                        Password must contain at least 6 characters and letters

                    </p>

                </div>


            <button onclick="signupUser()"
                class="w-full bg-blue-600 hover:bg-blue-700 transition-all duration-300 rounded-2xl py-4 text-white font-semibold text-sm shadow-sm">

                Signup

            </button>

        </div>

        <!-- FOOTER -->
        <p class="text-center text-gray-500 mt-6 text-sm">

            Already have an account?

            <a href="login.html" class="text-blue-600 font-medium">
                Login
            </a>

        </p>

    </div>

    <script>

        async function signupUser() {

            const username =
                document.getElementById("username").value;

            const email =
                document.getElementById("email").value;

            const password =
                document.getElementById("password").value;

            // VALIDATION

            if (
                !username ||
                !email ||
                !password
            ) {

                alert("Please fill all fields");

                return;
            }

            const response = await fetch(
                "http://127.0.0.1:8000/signup",
                {
                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        username,
                        email,
                        password
                    })
                }
            );

            const data = await response.json();

            if (response.ok) {

                alert("Signup successful!");

                window.location.href =
                    "login.html";

            } else {

                alert(data.detail);
            }
        }

    </script>

</body>

</html>
