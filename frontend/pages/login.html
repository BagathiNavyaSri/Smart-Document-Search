<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#f5f7fb] min-h-screen flex items-center justify-center px-6">

    <!-- CARD -->
    <div class="w-full max-w-md bg-white border border-gray-200 rounded-3xl p-8 shadow-sm">

        <!-- HEADER -->
        <div class="text-center mb-8">

            <div class="flex justify-center mb-5">

                <div class="w-16 h-16 rounded-2xl bg-blue-100 flex items-center justify-center">

                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-blue-600" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 17v-2a4 4 0 014-4h4" />

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 7h6m0 0v6m0-6L10 16" />

                    </svg>

                </div>

            </div>

            <h1 class="text-2xl font-bold text-gray-800">

                Welcome Back

            </h1>

            <p class="text-gray-500 mt-2 text-sm">

                Login to your AI workspace

            </p>

        </div>

        <!-- FORM -->
        <div class="space-y-4">

            <input type="email" id="email" placeholder="Email"
                class="w-full bg-[#f8fafc] border border-gray-300 rounded-2xl px-5 py-4 outline-none focus:border-blue-500 text-sm">

            <input type="password" id="password" placeholder="Password"
                class="w-full bg-[#f8fafc] border border-gray-300 rounded-2xl px-5 py-4 outline-none focus:border-blue-500 text-sm">

            <button onclick="loginUser()"
                class="w-full bg-blue-600 hover:bg-blue-700 transition-all duration-300 rounded-2xl py-4 text-white font-semibold text-sm shadow-sm">

                Login

            </button>

        </div>

        <!-- FOOTER -->
        <p class="text-center text-gray-500 mt-6 text-sm">

            Don’t have an account?

            <a href="signup.html" class="text-blue-600 font-medium">
                Signup
            </a>

        </p>

    </div>

    <script>

        async function loginUser() {

            const email =
                document.getElementById("email").value;

            const password =
                document.getElementById("password").value;

            // VALIDATION

            if (!email || !password) {

                alert("Please fill all fields");

                return;
            }

            const response = await fetch(
                "http://127.0.0.1:8000/login",
                {
                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        email,
                        password
                    })
                }
            );

            const data = await response.json();

            if (response.ok) {

                localStorage.setItem(
                    "token",
                    data.access_token
                );

                localStorage.setItem(
                    "username",
                    data.username
                );

                localStorage.setItem(
                    "email",
                    data.email
                );

                window.location.href =
                    "../index.html";

            } else {

                alert(data.detail);
            }
        }

    </script>

</body>

</html>
